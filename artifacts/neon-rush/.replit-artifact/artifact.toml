kind = "web"
previewPath = "/"
title = "Neon Rush"
version = "1.0.0"
id = "artifacts/neon-rush"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20528

[services.development]
run = "pnpm --filter @workspace/neon-rush run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-rush", "run", "build" ]
publicDir = "artifacts/neon-rush/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20528"
BASE_PATH = "/"
